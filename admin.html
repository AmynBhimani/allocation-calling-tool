<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team & Roles · Admin</title>
<link rel="stylesheet" href="styles.css">
<style>
  .admin-wrap{max-width:980px;margin:0 auto;padding:20px 24px 60px}
  .addcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    padding:18px 20px;margin-bottom:22px}
  .addcard h2{font-family:Cambria,Georgia,serif;font-size:18px;color:var(--ink);margin:0 0 14px}
  .form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--mute);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .field input,.field select{font:inherit;font-size:14px;border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;background:var(--paper);min-width:180px}
  .field input:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(2,128,144,.12);outline:none}
  .field.scope.hide{display:none}
  .muted-note{font-weight:400;text-transform:none;letter-spacing:0;color:var(--mute)}
  /* Areas takes its own full-width row so the checkbox grid has room and never spills its border */
  #areaField{flex:1 1 100%;}
  .area-checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px 18px;
    padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--paper);
    width:100%;max-width:660px;box-sizing:border-box}
  .area-checks label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);
    font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;min-width:0}
  .area-checks input{flex:0 0 auto;width:15px;height:15px;cursor:pointer;margin:0}
  .btn{font:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--teal);border:none;
    border-radius:9px;padding:10px 18px;cursor:pointer}
  .btn:hover{background:var(--teal-d)} .btn:disabled{opacity:.5;cursor:default}
  .role-pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;text-transform:capitalize}
  .r-admin{background:#E9F1FB;color:#2B5C9B} .r-dutyteam{background:#FBEEE2;color:#B8642A}
  .r-quarterback{background:#E4F3ED;color:#1E8A6E} .r-caller{background:#F3ECFB;color:#6B3FA0}
  .scope-txt{color:var(--mute);font-size:13px}
  .remove{font:inherit;font-size:12.5px;color:var(--accent);background:none;border:1px solid #EAD2CE;
    border-radius:7px;padding:5px 11px;cursor:pointer}
  .remove:hover{background:#FBEFEC}
  .hint{font-size:12.5px;color:var(--mute);margin-top:10px}
  .grouphdr{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--teal);font-weight:700;
    padding:14px 14px 6px}
</style>
</head>
<body>
<header class="app">
  <h1>Team &amp; Roles</h1>
  <span class="sub">Admin</span>
  <div class="userbox">
    <nav id="navlinks" class="navlinks"></nav>
    <span id="whoami" class="whoami"></span>
    <a class="ghost" href="/.auth/logout?post_logout_redirect_uri=/">Sign out</a>
  </div>
</header>

<div id="banner" class="banner" hidden></div>

<div class="admin-wrap">
  <div class="addcard">
    <h2>Add a team member</h2>
    <div class="form-row">
      <div class="field"><label>Email</label><input type="email" id="email" placeholder="name@example.com"></div>
      <div class="field"><label>Role</label>
        <select id="role">
          <option value="admin">Admin</option>
          <option value="dutyteam">Duty Allocation Team</option>
          <option value="quarterback">Quarterback</option>
          <option value="caller">Caller</option>
        </select>
      </div>
      <div class="field scope" id="eventField"><label>Event</label>
        <select id="event"><option value="">—</option></select>
      </div>
      <div class="field scope" id="areaField"><label>Areas <span class="muted-note">(pick one or more)</span></label>
        <div id="areaChecks" class="area-checks"></div>
      </div>
      <button class="btn" id="addBtn">Add</button>
    </div>
    <div class="hint" id="roleHint"></div>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>Email</th><th>Role</th><th>Scope</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="count" id="count">Loading…</div>
  </div>

  <div class="hint" style="margin-top:14px">
    Super Admin access is managed separately (via the app's <b>SUPER_ADMIN_EMAILS</b> setting) and isn't listed here.
    Changes take effect the next time a person signs in.
  </div>
</div>

<script src="nav.js"></script>
<script src="admin.js"></script>
</body>
</html>
