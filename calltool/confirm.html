<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm your volunteer duty</title>
<style>
  :root{ --ink:#1B3A4B; --teal:#028090; --accent:#C44536; --mute:#6b7c85; --line:#d9e2e6; --bg:#f3f7f8; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; max-width:440px; width:100%;
    padding:32px 28px; box-shadow:0 6px 28px rgba(27,58,75,.08); text-align:center; }
  .badge{ display:inline-block; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--teal); font-weight:700; margin-bottom:14px; }
  h1{ font-size:22px; margin:0 0 6px; }
  .duty{ font-size:18px; font-weight:700; color:var(--teal); margin:18px 0; padding:14px; background:#eef6f7; border-radius:10px; }
  p{ color:var(--mute); line-height:1.5; margin:10px 0; }
  button{ font:inherit; font-weight:700; color:#fff; background:var(--teal); border:0; border-radius:10px;
    padding:14px 22px; width:100%; cursor:pointer; margin-top:10px; }
  button:disabled{ opacity:.55; cursor:default; }
  .ok{ color:var(--teal); } .err{ color:var(--accent); }
  .big{ font-size:40px; line-height:1; margin:6px 0 8px; }
  .spin{ color:var(--mute); }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spin">Loading…</div>
  </div>

<script>
(function(){
  var q=new URLSearchParams(location.search);
  var u=q.get('u')||'', r=q.get('r')||'', t=q.get('t')||'';
  var card=document.getElementById('card');
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function invalid(msg){ card.innerHTML='<div class="big err">⚠</div><h1>This link isn\u2019t valid</h1><p>'+esc(msg||'This confirmation link is invalid or has expired. Please contact your volunteer coordinator.')+'</p>'; }
  function done(first,area){ card.innerHTML='<div class="big ok">✓</div><h1>Thank you'+(first?', '+esc(first):'')+'!</h1><p>Your assignment is confirmed:</p><div class="duty">'+esc(area)+'</div><p>You\u2019ll receive a confirmation of your seva details shortly. You can close this page.</p>'; }

  if(!u||!r||!t){ invalid(); return; }

  fetch('/api/confirm?u='+encodeURIComponent(u)+'&r='+encodeURIComponent(r)+'&t='+encodeURIComponent(t))
    .then(function(res){ return res.json().then(function(d){ return {ok:res.ok,d:d}; }); })
    .then(function(x){
      if(!x.d || !x.d.ok){ invalid(x.d && x.d.error); return; }
      if(x.d.confirmed){ done(x.d.first, x.d.area); return; }
      card.innerHTML='<div class="badge">Volunteer assignment</div><h1>Ya Ali Madad, '+esc(x.d.first)+'!</h1>'+
        '<p>You\u2019ve been assigned to a duty for the upcoming Visit, based on the area(s) of interest you indicated at registration:</p>'+
        '<div class="duty">'+esc(x.d.area)+'</div>'+
        '<p>Please click below to accept this assignment.</p>'+
        '<button id="confirmBtn">Accept this assignment</button>';
      document.getElementById('confirmBtn').addEventListener('click',function(){
        var b=this; b.disabled=true; b.textContent='Confirming…';
        fetch('/api/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({u:u,r:r,t:t})})
          .then(function(res){ return res.json(); })
          .then(function(d){ if(d && d.ok){ done(d.first||x.d.first, d.area||x.d.area); } else { b.disabled=false; b.textContent='Accept my duty'; invalid(d && d.error); } })
          .catch(function(){ b.disabled=false; b.textContent='Accept my duty'; });
      });
    })
    .catch(function(){ invalid(); });
})();
</script>
</body>
</html>
