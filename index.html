<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duty Allocation Team · Reconciliation</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="app">
  <h1>Duty Allocation Team</h1>
  <span class="sub">Reconciliation</span>
  <div class="userbox">
    <span id="whoami" class="whoami"></span>
    <a id="adminLink" class="ghost" href="/admin.html" hidden>Team &amp; Roles</a>
    <button id="seedBtn" class="ghost" hidden>Load sandbox data</button>
    <a class="ghost" href="/.auth/logout?post_logout_redirect_uri=/">Sign out</a>
  </div>
</header>

<div id="banner" class="banner" hidden></div>

<div class="wrap">
  <div class="kpis" id="kpis"></div>

  <div class="controls">
    <input type="search" id="q" placeholder="Search name…" aria-label="Search by name">
    <select id="region"><option value="">All regions</option></select>
    <select id="jk"><option value="">All Jamatkhanas</option></select>
    <select id="area"><option value="">All areas</option></select>
    <div class="chips" id="chips">
      <button class="chip" data-f="recon" aria-pressed="false">Needs decision</button>
      <button class="chip" data-f="unassigned" aria-pressed="false">Unassigned</button>
      <button class="chip" data-f="conflict" aria-pressed="false">Conflicts</button>
      <button class="chip" data-f="leader" aria-pressed="false">Leaders</button>
      <button class="chip" data-f="new" aria-pressed="false">New</button>
    </div>
    <div class="spacer"></div>
    <span class="resolved-note" id="resolved"></span>
  </div>

  <div class="panel">
    <table>
      <thead><tr>
        <th>Volunteer</th>
        <th class="hide-sm">Region</th>
        <th>Computed area</th>
        <th>Flags</th>
        <th>Callable status</th>
        <th>Final area</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="count" id="count">Loading…</div>
  </div>

  <div class="footer">Changes save to your team\u2019s shared workspace. Contact details are not shown here \u2014 they appear only on the caller\u2019s screen.</div>
</div>

<script src="app.js"></script>
</body>
</html>
