<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not yet approved</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F4F8F8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1B3A4B}
  .card{max-width:460px;background:#fff;border:1px solid #DCE7E9;border-radius:16px;padding:36px 34px;
    box-shadow:0 4px 20px rgba(27,58,75,.08);text-align:center}
  h1{font-family:Cambria,Georgia,serif;font-size:23px;margin:0 0 10px}
  p{color:#5B6B73;line-height:1.5;font-size:14.5px}
  .email{font-weight:600;color:#1B3A4B}
  a{color:#028090;text-decoration:none;font-weight:600}
</style></head>
<body><div class="card">
  <h1>You’re signed in, but not yet on the team list</h1>
  <p>This tool is limited to the Duty Allocation Team and coordinators. Your sign-in worked — your email just hasn’t been added to a role yet.</p>
  <p>Ask your coordinator to add the email you used, then sign in again.</p>
  <p id="who" class="email"></p>
  <p><a href="/.auth/logout?post_logout_redirect_uri=/">Sign out</a></p>
</div>
<script>
  fetch('/.auth/me').then(r=>r.json()).then(d=>{
    const e=d&&d.clientPrincipal&&d.clientPrincipal.userDetails;
    if(e) document.getElementById('who').textContent='You signed in as '+e;
  }).catch(()=>{});
</script>
</body></html>
